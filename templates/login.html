<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ascaneli - Acceso</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
  <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
  <style>
    :root{ --bg:#ffffff; --card:#f8f9fa; --accent:#212529; --muted:#6c757d; --info:#0d6efd; --error:#dc3545 }
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial}
    body{display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
    .card{width:100%;max-width:420px;background:var(--card);padding:28px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.06);text-align:center}
    .logo{width:60px;height:60px;margin:0 auto 16px;background:url('{{ url_for("static", filename="logo.png") }}') center/contain no-repeat}
    h1{margin:0 0 18px;font-size:20px;color:var(--accent)}
    form{display:flex;flex-direction:column;gap:12px}
    input[type=password]{width:100%;padding:14px 12px;font-size:18px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box}
    input:focus{outline:none;border-color:var(--info);box-shadow:0 0 0 3px rgba(13,110,253,0.1)}
    button{padding:12px 14px;font-size:18px;border-radius:8px;border:none;background:var(--accent);color:white;cursor:pointer}
    button:active{transform:translateY(1px)}
    .alert{padding:12px 14px;border-radius:8px;margin-bottom:16px;font-size:13px;font-weight:500}
    .alert-info{background:#cfe2ff;color:#084298;border:1px solid #b6d4fe}
    .alert-error{background:#f8d7da;color:#842029;border:1px solid #f5c2c7}
    @media(min-width:700px){body{padding:40px};h1{font-size:24px}}
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="logo"></div>
    <h1>ASCANELLI - ACCESO</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'info' if category == 'info' else 'error' }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post" autocomplete="off">
      <input type="text" name="legajo" placeholder="Legajo (ej: 1234)" inputmode="numeric" pattern="[0-9]{4}" maxlength="10" autofocus required>
      <input type="password" name="pin_secreto" placeholder="PIN Secreto" inputmode="numeric" pattern="[0-9]{4}" maxlength="10" required>
      <button type="submit">Entrar</button>
    </form>
  </main>
</body>
</html>
