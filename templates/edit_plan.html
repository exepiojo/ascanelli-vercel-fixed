<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Registro - Ascanelli</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 500px; border-radius: 15px;">
        <div class="card-header bg-primary text-white p-3">
            <h5 class="mb-0">Editar Chasis: {{ item.nro_chasis }}</h5>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-3">
                      <label class="form-label fw-bold">Fecha</label>
                      <input type="date" name="fecha" class="form-control" value="{{ item.fecha }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Implemento</label>
                    <input type="text" name="implemento" class="form-control" value="{{ item.implemento }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Modelo</label>
                    <input type="text" name="modelo" class="form-control" value="{{ item.modelo }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Sector</label>
                    <input type="text" name="sector" class="form-control" value="{{ item.sector }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Puesto</label>
                    <input type="text" name="puesto" class="form-control" value="{{ item.puesto_conjunto }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">N° Chasis</label>
                    <input type="text" name="chasis" class="form-control" value="{{ item.nro_chasis }}" required>
                </div>
                <div class="d-flex justify-content-between mt-4">
                    <a href="/admin/plan" class="btn btn-secondary px-4">Cancelar</a>
                    <button type="submit" class="btn btn-success px-4">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
