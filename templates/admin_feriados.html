<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Feriados - Ascanelli</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; border: none; }
        .header-section { background: #212529; color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .calendar-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .month-card { border: 1px solid #dee2e6; border-radius: 8px; overflow: hidden; }
        .month-header { background: #495057; color: white; padding: 8px; text-align: center; font-weight: bold; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #dee2e6; }
        .calendar-day { background: white; padding: 4px; text-align: center; font-size: 12px; min-height: 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .calendar-day:hover { background: #f8f9fa; }
        .calendar-day.holiday { background: #ff6b6b; color: white; font-weight: bold; }
        .calendar-day.weekend { background: #e9ecef; color: #6c757d; }
        .calendar-day.header { background: #495057; color: white; font-weight: bold; }
        .year-selector { margin-bottom: 20px; text-align: center; }
        .year-selector select { font-size: 18px; padding: 8px 15px; }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    
    <div class="header-section d-flex justify-content-between align-items-center shadow">
        <div>
            <h2 class="mb-0"> Calendario de Feriados</h2>
            <p class="mb-0 opacity-75">Días no laborables para el cálculo de producción</p>
        </div>
        <div>
            <a href="/admin/configuracion" class="btn btn-outline-light me-2">← Volver a Configuración</a>
            <button class="btn btn-primary fw-bold" data-bs-toggle="modal" data-bs-target="#modalFeriado">+ AGREGAR FERIADO</button>
        </div>
    </div>

    <div class="year-selector">
        <label for="yearSelect" class="me-2 fw-bold">Año:</label>
        <select id="yearSelect" class="form-select d-inline-block w-auto">
            <!-- Years will be populated by JavaScript -->
        </select>
    </div>

    <div class="calendar-container" id="calendarContainer">
        <!-- Calendar months will be generated by JavaScript -->
    </div>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Fecha</th>
                        <th>Descripción / Motivo</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for f in feriados %}
                    <tr>
                        <td class="ps-4 fw-bold text-primary">{{ f.fecha }}</td>
                        <td>{{ f.descripcion }}</td>
                        <td class="text-center">
                            <a href="/admin/eliminar_feriado/{{ f.id }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Eliminar este feriado?')">Eliminar</a>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">No hay feriados cargados aún.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalFeriado" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form action="/admin/agregar_feriado" method="POST" class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Cargar Nuevo Feriado</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">Fecha del Feriado</label>
                    <input type="date" name="fecha" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Descripción</label>
                    <input type="text" name="descripcion" class="form-control" placeholder="Ej: Navidad, Viernes Santo" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-primary px-4">GUARDAR FERIADO</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Holiday data from Flask template
const holidays = JSON.parse('{{ feriados|tojson|safe }}');

// Month names in Spanish
const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                   'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

// Initialize calendar
document.addEventListener('DOMContentLoaded', function() {
    initializeYearSelector();
    generateCalendar(new Date().getFullYear());
});

function initializeYearSelector() {
    const yearSelect = document.getElementById('yearSelect');
    const currentYear = new Date().getFullYear();
    
    // Add years from current year - 2 to current year + 5
    for (let year = currentYear - 2; year <= currentYear + 5; year++) {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = year;
        if (year === currentYear) {
            option.selected = true;
        }
        yearSelect.appendChild(option);
    }
    
    yearSelect.addEventListener('change', function() {
        generateCalendar(parseInt(this.value));
    });
}

function generateCalendar(year) {
    const container = document.getElementById('calendarContainer');
    container.innerHTML = '';
    
    for (let month = 0; month < 12; month++) {
        const monthCard = createMonthCard(year, month);
        container.appendChild(monthCard);
    }
}

function createMonthCard(year, month) {
    const card = document.createElement('div');
    card.className = 'month-card';
    
    // Month header
    const header = document.createElement('div');
    header.className = 'month-header';
    header.textContent = monthNames[month];
    card.appendChild(header);
    
    // Calendar grid
    const grid = document.createElement('div');
    grid.className = 'calendar-grid';
    
    // Day headers (D, L, M, M, J, V, S)
    const dayHeaders = ['D', 'L', 'M', 'M', 'J', 'V', 'S'];
    dayHeaders.forEach(day => {
        const dayHeader = document.createElement('div');
        dayHeader.className = 'calendar-day header';
        dayHeader.textContent = day;
        grid.appendChild(dayHeader);
    });
    
    // Get first day of month and number of days
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    // Add empty cells for days before month starts
    for (let i = 0; i < firstDay; i++) {
        const emptyDay = document.createElement('div');
        emptyDay.className = 'calendar-day';
        grid.appendChild(emptyDay);
    }
    
    // Add days of the month
    for (let day = 1; day <= daysInMonth; day++) {
        const dayElement = document.createElement('div');
        dayElement.className = 'calendar-day';
        dayElement.textContent = day;
        
        // Format date as DD/MM/YYYY
        const dateStr = String(day).padStart(2, '0') + '/' + String(month + 1).padStart(2, '0') + '/' + year;
        
        // Check if it's a weekend
        const dayOfWeek = new Date(year, month, day).getDay();
        if (dayOfWeek === 0 || dayOfWeek === 6) {
            dayElement.classList.add('weekend');
        }
        
        // Check if it's a holiday
        const holiday = holidays.find(h => h.fecha === dateStr);
        if (holiday) {
            dayElement.classList.add('holiday');
            dayElement.title = holiday.descripcion;
        }
        
        // Add click event to toggle holiday
        dayElement.addEventListener('click', function() {
            toggleHoliday(dateStr, dayElement);
        });
        
        grid.appendChild(dayElement);
    }
    
    card.appendChild(grid);
    return card;
}

function toggleHoliday(dateStr, element) {
    const holiday = holidays.find(h => h.fecha === dateStr);
    
    if (holiday) {
        // Remove holiday
        if (confirm(`¿Eliminar el feriado ${dateStr} - ${holiday.descripcion}?`)) {
            window.location.href = `/admin/eliminar_feriado/${holiday.id}`;
        }
    } else {
        // Add holiday
        const description = prompt(`Agregar feriado para ${dateStr}:`, 'Feriado');
        if (description) {
            // Convert DD/MM/YYYY to YYYY-MM-DD for the form
            const [day, month, year] = dateStr.split('/');
            const dateForForm = `${year}-${month}-${day}`;
            
            // Create and submit form
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/admin/agregar_feriado';
            
            const dateInput = document.createElement('input');
            dateInput.type = 'hidden';
            dateInput.name = 'fecha';
            dateInput.value = dateForForm;
            
            const descInput = document.createElement('input');
            descInput.type = 'hidden';
            descInput.name = 'descripcion';
            descInput.value = description;
            
            form.appendChild(dateInput);
            form.appendChild(descInput);
            document.body.appendChild(form);
            form.submit();
        }
    }
}
</script>
</body>
</html>
